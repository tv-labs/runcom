name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  MIX_ENV: test

jobs:
  format:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "28.3"
      - name: Check formatting
        run: |
          for pkg in runcom runcom_ecto runcom_rmq runcom_web; do
            echo "==> Checking $pkg"
            (cd "$pkg" && mix format --check-formatted)
          done

  test-pure:
    name: Test ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [runcom, runcom_rmq]
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "28.3"
      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            ${{ matrix.package }}/deps
            ${{ matrix.package }}/_build
          key: ${{ runner.os }}-mix-${{ matrix.package }}-${{ hashFiles(format('{0}/mix.lock', matrix.package)) }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ matrix.package }}-
      - name: Install deps
        working-directory: ${{ matrix.package }}
        run: mix deps.get
      - name: Compile (warnings as errors)
        working-directory: ${{ matrix.package }}
        run: mix compile --warnings-as-errors
      - name: Check for compile-time dependency cycles
        working-directory: ${{ matrix.package }}
        run: mix xref graph --format cycles --fail-above 0
      - name: Run tests
        working-directory: ${{ matrix.package }}
        run: mix test

  test-postgres:
    name: Test ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [runcom_ecto, runcom_web]
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "28.3"
      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            ${{ matrix.package }}/deps
            ${{ matrix.package }}/_build
          key: ${{ runner.os }}-mix-${{ matrix.package }}-${{ hashFiles(format('{0}/mix.lock', matrix.package)) }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ matrix.package }}-
      - name: Install deps
        working-directory: ${{ matrix.package }}
        run: mix deps.get
      - name: Compile (warnings as errors)
        working-directory: ${{ matrix.package }}
        run: mix compile --warnings-as-errors
      - name: Check for compile-time dependency cycles
        working-directory: ${{ matrix.package }}
        run: mix xref graph --format cycles --fail-above 0
      - name: Run tests
        working-directory: ${{ matrix.package }}
        run: mix test
