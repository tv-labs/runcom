name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "*/VERSION"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  RUNCOM_ROOT: ${{ github.workspace }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "28.3"
      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: website/deps
          key: website-deps-${{ hashFiles('website/mix.lock') }}
          restore-keys: website-deps-
      - name: Cache build
        uses: actions/cache@v4
        with:
          path: website/_build
          key: website-build-${{ hashFiles('website/mix.lock') }}
          restore-keys: website-build-
      - run: mix deps.get
      - run: mix tableau.build
      - run: mix tailwind default
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/_site

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
