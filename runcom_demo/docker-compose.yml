      context: ..
      dockerfile: runcom_demo/Dockerfile.agent
    hostname: agent-lax-001
    restart: unless-stopped
    environment:
      AMQP_URL: amqp://guest:guest@rabbitmq:5672
      NODE_ID: agent-lax-001
      RUNCOM_ARTIFACT_DIR: /data/runcom
    volumes:
      - agent-lax-001-data:/data/runcom
    depends_on:
      rabbitmq:
        condition: service_healthy

  agent-lax-002:
    build:
      context: ..
      dockerfile: runcom_demo/Dockerfile.agent
    hostname: agent-lax-002
    restart: unless-stopped
    environment:
      AMQP_URL: amqp://guest:guest@rabbitmq:5672
      NODE_ID: agent-lax-002
      RUNCOM_ARTIFACT_DIR: /data/runcom
    volumes:
      - agent-lax-002-data:/data/runcom
    depends_on:
      rabbitmq:
        condition: service_healthy

  agent-ams-001:
    build:
      context: ..
      dockerfile: runcom_demo/Dockerfile.agent
    hostname: agent-ams-001
    restart: unless-stopped
    environment:
      AMQP_URL: amqp://guest:guest@rabbitmq:5672
      NODE_ID: agent-ams-001
      RUNCOM_ARTIFACT_DIR: /data/runcom
    volumes:
      - agent-ams-001-data:/data/runcom
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  pgdata:
  rmqdata:
  agent-nyc-001-data:
  agent-nyc-002-data:
  agent-lax-001-data:
  agent-lax-002-data:
  agent-ams-001-data:
