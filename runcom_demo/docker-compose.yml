services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: runcom_demo_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - rmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  agent-nyc-001:
    build:
      context: ..
      dockerfile: runcom_demo/Dockerfile.agent
    hostname: agent-nyc-001
    restart: unless-stopped
    environment:
      AMQP_URL: amqp://guest:guest@rabbitmq:5672
      NODE_ID: agent-nyc-001
      RUNCOM_ARTIFACT_DIR: /data/runcom
    volumes:
      - agent-nyc-001-data:/data/runcom
    depends_on:
      rabbitmq:
        condition: service_healthy

  agent-nyc-002:
    build:
      context: ..
      dockerfile: runcom_demo/Dockerfile.agent
    hostname: agent-nyc-002
    restart: unless-stopped
    environment:
      AMQP_URL: amqp://guest:guest@rabbitmq:5672
      NODE_ID: agent-nyc-002
      RUNCOM_ARTIFACT_DIR: /data/runcom
    volumes:
      - agent-nyc-002-data:/data/runcom
    depends_on:
      rabbitmq:
        condition: service_healthy

  agent-lax-001:
